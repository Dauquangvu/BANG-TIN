<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bảng Tin 2026</title>
  <style>
    :root {
      --gold:    #c8941a;
      --gold-lt: #f0d080;
      --red:     #b71c1c;
      --red-dk:  #7f0000;
      --cream:   #fdf6e3;
      --text:    #2c1a00;
      --muted:   #6b4c1e;
      --border:  #d4a843;
      --shadow:  rgba(100,40,0,0.18);
      --blue:    #1565c0;
      --blue-dk: #1a5276;
      --blue-lt: #aed6f1;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: var(--red-dk);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ── HEADER ── */
    header {
      width: 100%;
      background: linear-gradient(135deg, var(--red-dk) 0%, var(--red) 55%, #c62828 100%);
      border-bottom: 3px solid var(--gold);
      padding: 16px 20px 12px;
      text-align: center;
      position: relative;
    }
    .header-top {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      flex-wrap: wrap;
    }
    .header-emblem {
      display: flex;
      flex-direction: column;
      align-items: center;
      line-height: 1;
      gap: 2px;
    }
    .star-row { font-size: 1.6rem; color: var(--gold); letter-spacing: 4px; }
    .unit-text {
      color: #ffcdd2;
      font-size: 0.72rem;
      letter-spacing: 0.15em;
      font-weight: 600;
      text-transform: uppercase;
    }
    .header-title { text-align: center; }
    .header-title h1 {
      color: var(--gold-lt);
      font-size: clamp(1.4rem, 5vw, 2.2rem);
      font-weight: 900;
      letter-spacing: 0.08em;
      text-shadow: 0 2px 8px rgba(0,0,0,0.55);
      text-transform: uppercase;
    }
    .header-title .sub {
      color: #ffcdd2;
      font-size: 0.78rem;
      font-style: italic;
      letter-spacing: 0.1em;
      margin-top: 3px;
    }
    .header-divider {
      width: 80%;
      max-width: 400px;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      margin: 8px auto 0;
    }

    /* ── TABS ── */
    .tabs-wrap {
      width: 100%;
      max-width: 860px;
      padding: 14px 16px 0;
      display: flex;
      gap: 6px;
    }
    .tab-btn {
      flex: 1;
      padding: 10px 6px;
      border: none;
      border-radius: 10px 10px 0 0;
      font-size: clamp(0.72rem, 2.5vw, 0.88rem);
      font-weight: 700;
      cursor: pointer;
      background: rgba(255,255,255,0.09);
      color: rgba(240,208,128,0.65);
      border-bottom: 3px solid transparent;
      transition: all 0.2s;
      white-space: nowrap;
    }
    .tab-btn.active {
      background: var(--cream);
      color: var(--red-dk);
      border-bottom-color: var(--gold);
    }
    .tab-btn:hover:not(.active) {
      background: rgba(255,255,255,0.18);
      color: var(--gold-lt);
    }

    /* ── MAIN ── */
    main {
      width: 100%;
      max-width: 860px;
      padding: 0 16px 44px;
      flex: 1;
    }

    /* ── PANELS ── */
    .panel { display: none; padding-top: 18px; }
    .panel.active { display: block; animation: fadeIn 0.35s ease; }
    @keyframes fadeIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:none} }

    /* ── DATE NAV ── */
    .date-nav {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-bottom: 18px;
      flex-wrap: wrap;
    }
    .nav-btn {
      background: var(--gold);
      color: var(--red-dk);
      border: none;
      border-radius: 8px;
      padding: 8px 16px;
      font-size: 0.88rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      white-space: nowrap;
    }
    .nav-btn:hover  { background: var(--gold-lt); transform: translateY(-1px); }
    .nav-btn:active { transform: none; }
    .nav-btn:disabled { opacity: 0.4; cursor: default; transform: none; }

    .nav-btn.blue { background: #5dade2; color: #fff; }
    .nav-btn.blue:hover { background: #85c1e9; }

    .date-display {
      background: rgba(255,255,255,0.10);
      border: 1px solid rgba(212,168,67,0.5);
      border-radius: 8px;
      padding: 7px 18px;
      color: var(--gold-lt);
      font-weight: 700;
      font-size: 0.95rem;
      min-width: 170px;
      text-align: center;
    }
    .date-display.blue {
      border-color: rgba(93,173,226,0.5);
      color: var(--blue-lt);
    }

    input[type="date"] {
      background: rgba(255,255,255,0.12);
      border: 1px solid var(--gold);
      border-radius: 8px;
      color: var(--gold-lt);
      font-size: 0.88rem;
      padding: 7px 10px;
      outline: none;
      cursor: pointer;
    }
    input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(1) sepia(1) saturate(3); }

    /* ── CHIP ROWS ── */
    .chip-row {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      justify-content: center;
      margin-bottom: 16px;
    }
    .chip {
      border-radius: 20px;
      font-size: 0.72rem;
      padding: 3px 10px;
      cursor: pointer;
      transition: background 0.2s;
      border: 1px solid rgba(212,168,67,0.35);
      background: rgba(255,255,255,0.08);
      color: rgba(240,208,128,0.75);
    }
    .chip:hover, .chip.active {
      background: rgba(200,148,26,0.3);
      border-color: var(--gold);
      color: var(--gold-lt);
    }
    .chip.blue-chip {
      border-color: rgba(93,173,226,0.35);
      color: rgba(174,214,241,0.75);
    }
    .chip.blue-chip:hover, .chip.blue-chip.active {
      background: rgba(21,101,192,0.35);
      border-color: #5dade2;
      color: var(--blue-lt);
    }

    /* ── CARD SHARED ── */
    .card {
      background: var(--cream);
      border-radius: 14px;
      border: 2px solid var(--border);
      box-shadow: 0 8px 32px var(--shadow);
      overflow: hidden;
    }

    /* ── CARD HEADER — RED ── */
    .card-hd {
      background: linear-gradient(135deg, var(--red), var(--red-dk));
      padding: 14px 22px 12px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 2px solid var(--gold);
    }
    .card-hd .hicon { font-size: 2rem; }
    .card-hd .htitle {
      color: var(--gold-lt);
      font-size: 0.75rem;
      letter-spacing: 0.12em;
      font-weight: 600;
      text-transform: uppercase;
    }
    .card-hd .hdate { color: #fff; font-size: 1.05rem; font-weight: 800; }

    /* ── CARD HEADER — BLUE ── */
    .card-hd.blue-hd {
      background: linear-gradient(135deg, var(--blue-dk), var(--blue));
      border-bottom-color: #5dade2;
    }
    .card-hd.blue-hd .htitle { color: var(--blue-lt); }
    .card-hd.blue-hd .hdate  { color: #fff; }

    /* ── QUOTE BLOCK (Tab 1) ── */
    .quote-block {
      padding: 24px 26px 18px;
      border-bottom: 1px solid #e8d5a0;
    }
    .sect-label {
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--red);
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .sect-label::after { content:''; flex:1; height:1px; background:var(--border); opacity:.5; }
    .quote-text {
      font-size: clamp(1rem, 2.6vw, 1.2rem);
      font-weight: 700;
      color: var(--red-dk);
      line-height: 1.65;
      font-style: italic;
      border-left: 4px solid var(--gold);
      padding-left: 16px;
    }
    .sections { padding: 20px 26px 24px; display: flex; flex-direction: column; gap: 16px; }
    .section-text { color: var(--text); font-size: 0.95rem; line-height: 1.72; }

    /* ── QA BLOCK (Tab 2) ── */
    .qa-block { padding: 22px 26px; }
    .qa-label {
      font-size: .72rem; font-weight: 700; letter-spacing: .14em;
      text-transform: uppercase; margin-bottom: 8px;
      display: flex; align-items: center; gap: 6px;
    }
    .qa-label::after { content:''; flex:1; height:1px; background:var(--border); opacity:.5; }
    .qa-label.q { color: var(--red); }
    .qa-label.a { color: #1a6600; }
    .qa-q {
      font-size: 1rem; font-weight: 600; color: var(--text);
      line-height: 1.7; margin-bottom: 18px;
      padding: 14px 16px; background: #fff8e1;
      border-left: 4px solid var(--gold); border-radius: 0 8px 8px 0;
    }
    .qa-a {
      font-size: .95rem; color: #1a3a00; line-height: 1.75;
      padding: 14px 16px; background: #f1f8e9;
      border-left: 4px solid #66bb6a; border-radius: 0 8px 8px 0;
    }
    .toggle-btn {
      display: block; margin: 10px 0 0;
      background: var(--red); color: #fff;
      border: none; border-radius: 8px; padding: 8px 20px;
      font-size: .88rem; font-weight: 700; cursor: pointer;
      transition: background .2s;
    }
    .toggle-btn:hover { background: var(--red-dk); }
    .hidden { display: none !important; }

    /* ── LAW BLOCK (Tab 3) ── */
    .law-block { padding: 22px 26px; }
    .law-title {
      font-size: 1.05rem; font-weight: 700; color: var(--blue);
      margin-bottom: 16px; padding-bottom: 10px;
      border-bottom: 2px solid #aed6f1; line-height: 1.5;
    }
    .law-content {
      font-size: .95rem; color: var(--text);
      line-height: 1.82;
    }
    .law-content br { display: block; margin-bottom: 6px; content: ''; }

    /* ── NO DATA ── */
    .no-data { text-align: center; padding: 44px 20px; color: var(--muted); }
    .no-data .nd-icon { font-size: 2.8rem; margin-bottom: 10px; }
    .no-data p { font-size: .97rem; line-height: 1.6; }

    /* ── FOOTER ── */
    footer {
      color: rgba(255,220,130,0.55);
      font-size: 0.73rem;
      text-align: center;
      padding: 14px 16px;
      letter-spacing: 0.06em;
    }

    @media (max-width: 520px) {
      main { padding: 0 8px 32px; }
      .quote-block, .sections, .qa-block, .law-block { padding-left: 14px; padding-right: 14px; }
      .date-nav { gap: 5px; }
      .header-title h1 { letter-spacing: 0.04em; }
    }
  </style>
</head>
<body>

<!-- ══ HEADER ══ -->
<header>
  <div class="header-top">
    <div class="header-emblem">
      <div class="star-row">★ ★ ★</div>
      <div class="unit-text">Trung đoàn 1 — Sư đoàn 324</div>
    </div>
    <div class="header-title">
      <h1>📌 Bảng Tin 2026</h1>
      <div class="sub">Học tập &bull; Pháp luật &bull; Tư tưởng Hồ Chí Minh</div>
    </div>
    <div class="header-emblem">
      <div class="star-row">★ ★ ★</div>
      <div class="unit-text">Năm 2026</div>
    </div>
  </div>
  <div class="header-divider"></div>
</header>

<!-- ══ TABS ══ -->
<div class="tabs-wrap">
  <button class="tab-btn active" data-tab="tab-bac">☭ Lời Bác Dạy</button>
  <button class="tab-btn"        data-tab="tab-cauhoi">❓ Câu Hỏi Ngày</button>
  <button class="tab-btn"        data-tab="tab-luat">⚖️ Tuần Pháp Luật</button>
</div>

<main>

  <!-- ══════ TAB 1: LỜI BÁC DẠY ══════ -->
  <div class="panel active" id="tab-bac">
    <div class="chip-row" id="monthNavBac"></div>
    <div class="date-nav">
      <button class="nav-btn" id="bacPrev">◀ Ngày trước</button>
      <div class="date-display" id="bacDisplay">—</div>
      <button class="nav-btn" id="bacNext">Ngày sau ▶</button>
      <input type="date" id="bacPicker" min="2026-01-01" max="2026-12-31"/>
      <button class="nav-btn" id="bacToday">Hôm nay</button>
    </div>
    <div class="card" id="bacCard">
      <div class="no-data"><div class="nd-icon">⏳</div><p>Đang tải…</p></div>
    </div>
  </div>

  <!-- ══════ TAB 2: CÂU HỎI HÀNG NGÀY ══════ -->
  <div class="panel" id="tab-cauhoi">
    <div class="chip-row" id="monthNavQA"></div>
    <div class="date-nav">
      <button class="nav-btn" id="qaPrev">◀ Hôm trước</button>
      <div class="date-display" id="qaDisplay">—</div>
      <button class="nav-btn" id="qaNext">Hôm sau ▶</button>
      <input type="date" id="qaPicker" min="2026-01-01" max="2026-06-30"/>
      <button class="nav-btn" id="qaToday">Hôm nay</button>
    </div>
    <div class="card" id="qaCard">
      <div class="no-data"><div class="nd-icon">⏳</div><p>Đang tải…</p></div>
    </div>
  </div>

  <!-- ══════ TAB 3: TUẦN PHÁP LUẬT ══════ -->
  <div class="panel" id="tab-luat">
    <div class="chip-row" id="weekChips"></div>
    <div class="date-nav">
      <button class="nav-btn blue" id="luatPrev">◀ Tuần trước</button>
      <div class="date-display blue" id="luatDisplay">—</div>
      <button class="nav-btn blue" id="luatNext">Tuần sau ▶</button>
      <button class="nav-btn blue" id="luatNow">Tuần này</button>
    </div>
    <div class="card" id="luatCard">
      <div class="no-data"><div class="nd-icon">⏳</div><p>Đang tải…</p></div>
    </div>
  </div>

</main>

<footer>
  ★ Bảng Tin Trung đoàn 1 — Sư đoàn 324 &mdash; Dữ liệu 2026 ★
</footer>

<script>
/* ════════════════════════════════════════════
   GLOBALS
════════════════════════════════════════════ */
const MONTHS_VI = ['','Tháng 1','Tháng 2','Tháng 3','Tháng 4','Tháng 5','Tháng 6',
                   'Tháng 7','Tháng 8','Tháng 9','Tháng 10','Tháng 11','Tháng 12'];
const DAYS_VI   = ['Chủ nhật','Thứ hai','Thứ ba','Thứ tư','Thứ năm','Thứ sáu','Thứ bảy'];
const pad = n => String(n).padStart(2,'0');

let DATA_BAC   = {};
let DATA_QA    = {};
let DATA_WEEKS = {};
let curBac     = '';
let curQA      = '';
let curWeek    = '';

/* ════════════════════════════════════════════
   TABS
════════════════════════════════════════════ */
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById(btn.dataset.tab).classList.add('active');
  });
});

/* ════════════════════════════════════════════
   SHARED HELPERS
════════════════════════════════════════════ */
function todayKey() {
  const n = new Date();
  return `2026-${pad(n.getMonth()+1)}-${pad(n.getDate())}`;
}
function formatDate(key) {
  if (!key) return '—';
  const [y,m,d] = key.split('-').map(Number);
  return `${DAYS_VI[new Date(y,m-1,d).getDay()]}, ${d}/${m}/${y}`;
}
function adjDate(obj, key, dir) {
  const dates = Object.keys(obj).sort();
  const idx = dates.indexOf(key);
  if (idx === -1) {
    return dir === -1
      ? (dates.filter(d=>d<key).pop() || null)
      : (dates.find(d=>d>key)  || null);
  }
  const n = idx + dir;
  return (n >= 0 && n < dates.length) ? dates[n] : null;
}
function buildMonthChips(containerId, obj, chipClass, onClickFn) {
  const counts = {};
  Object.keys(obj).forEach(k => { const m=k.split('-')[1]; counts[m]=(counts[m]||0)+1; });
  const nav = document.getElementById(containerId);
  nav.innerHTML = '';
  const maxM = Math.max(...Object.keys(obj).map(k=>+k.split('-')[1]));
  for (let m = 1; m <= maxM; m++) {
    const mm = pad(m), cnt = counts[mm]||0;
    const c = document.createElement('button');
    c.className = `chip ${chipClass}`; c.dataset.month = m;
    c.textContent = `T${m} (${cnt})`; c.title = `${MONTHS_VI[m]} — ${cnt} ngày`;
    c.addEventListener('click', () => { const f=Object.keys(obj).sort().find(k=>k.startsWith(`2026-${mm}-`)); if(f) onClickFn(f); });
    nav.appendChild(c);
  }
}
function highlightChip(containerId, key) {
  const m = parseInt(key.split('-')[1]);
  document.querySelectorAll(`#${containerId} .chip`).forEach(c => c.classList.toggle('active', +c.dataset.month===m));
}

/* ════════════════════════════════════════════
   TAB 1 — LỜI BÁC DẠY
════════════════════════════════════════════ */
function renderBac(key) {
  const card = document.getElementById('bacCard');
  const e = DATA_BAC[key];
  if (!e) {
    const near = adjDate(DATA_BAC, key, 1) || adjDate(DATA_BAC, key, -1);
    card.innerHTML = `<div class="no-data"><div class="nd-icon">🌸</div>
      <p>Chưa có lời Bác dạy cho ngày này.${near?`<br><button class="nav-btn" style="margin-top:12px" onclick="goBac('${near}')">Xem ngày gần nhất</button>`:''}</p></div>`;
    return;
  }
  const [y,m,d] = key.split('-').map(Number);
  const dow = DAYS_VI[new Date(y,m-1,d).getDay()];
  const sec = (label, icon, txt) => txt ? `
    <div>
      <div class="sect-label">${icon} ${label}</div>
      <div class="section-text">${txt}</div>
    </div>` : '';
  card.innerHTML = `
    <div class="card-hd">
      <div class="hicon">☭</div>
      <div>
        <div class="htitle">Lời Bác Dạy Ngày Này Năm Xưa</div>
        <div class="hdate">${dow}, ngày ${d} ${MONTHS_VI[m]} ${y}</div>
      </div>
    </div>
    <div class="quote-block">
      <div class="sect-label">✦ Lời dạy</div>
      <div class="quote-text">${e.quote}</div>
    </div>
    <div class="sections">
      ${sec('Xuất xứ','📜',e.source)}
      ${sec('Ý nghĩa lịch sử','🏛️',e.context)}
      ${sec('Vận dụng','⭐',e.lesson)}
    </div>`;
}
function goBac(key) {
  curBac = key;
  document.getElementById('bacDisplay').textContent = formatDate(key);
  document.getElementById('bacPicker').value = key;
  document.getElementById('bacPrev').disabled = !adjDate(DATA_BAC, key, -1);
  document.getElementById('bacNext').disabled = !adjDate(DATA_BAC, key,  1);
  highlightChip('monthNavBac', key);
  renderBac(key);
  window.scrollTo({top:0,behavior:'smooth'});
}
document.getElementById('bacPrev').addEventListener('click', ()=>{ const d=adjDate(DATA_BAC,curBac,-1); if(d)goBac(d); });
document.getElementById('bacNext').addEventListener('click', ()=>{ const d=adjDate(DATA_BAC,curBac, 1); if(d)goBac(d); });
document.getElementById('bacToday').addEventListener('click', ()=>goBac(todayKey()));
document.getElementById('bacPicker').addEventListener('change', e=>goBac(e.target.value));

/* ════════════════════════════════════════════
   TAB 2 — CÂU HỎI HÀNG NGÀY
════════════════════════════════════════════ */
function renderQA(key) {
  const card = document.getElementById('qaCard');
  const e = DATA_QA[key];
  if (!e) {
    const near = adjDate(DATA_QA, key, 1) || adjDate(DATA_QA, key, -1);
    card.innerHTML = `<div class="no-data"><div class="nd-icon">🌸</div>
      <p>Chưa có câu hỏi cho ngày này.${near?`<br><button class="nav-btn" style="margin-top:12px" onclick="goQA('${near}')">Xem ngày gần nhất</button>`:''}</p></div>`;
    return;
  }
  const [y,m,d] = key.split('-').map(Number);
  const dow = DAYS_VI[new Date(y,m-1,d).getDay()];
  card.innerHTML = `
    <div class="card-hd">
      <div class="hicon">❓</div>
      <div>
        <div class="htitle">Mỗi Ngày Một Câu Hỏi — Một Đáp Án</div>
        <div class="hdate">${dow}, ngày ${d} ${MONTHS_VI[m]} ${y}</div>
      </div>
    </div>
    <div class="qa-block">
      <div class="qa-label q">📋 Câu hỏi</div>
      <div class="qa-q">${e.cauhoi}</div>
      <button class="toggle-btn" id="toggleAns" onclick="toggleAns()">👁 Xem đáp án</button>
      <div id="answerBlock" class="hidden">
        <div class="qa-label a" style="margin-top:16px">✅ Đáp án</div>
        <div class="qa-a">${e.dapan}</div>
      </div>
    </div>`;
}
function toggleAns() {
  const blk = document.getElementById('answerBlock');
  const btn = document.getElementById('toggleAns');
  blk.classList.toggle('hidden');
  btn.textContent = blk.classList.contains('hidden') ? '👁 Xem đáp án' : '🙈 Ẩn đáp án';
}
function goQA(key) {
  curQA = key;
  document.getElementById('qaDisplay').textContent = formatDate(key);
  document.getElementById('qaPicker').value = key;
  document.getElementById('qaPrev').disabled = !adjDate(DATA_QA, key, -1);
  document.getElementById('qaNext').disabled = !adjDate(DATA_QA, key,  1);
  highlightChip('monthNavQA', key);
  renderQA(key);
  window.scrollTo({top:0,behavior:'smooth'});
}
document.getElementById('qaPrev').addEventListener('click', ()=>{ const d=adjDate(DATA_QA,curQA,-1); if(d)goQA(d); });
document.getElementById('qaNext').addEventListener('click', ()=>{ const d=adjDate(DATA_QA,curQA, 1); if(d)goQA(d); });
document.getElementById('qaToday').addEventListener('click', ()=>goQA(todayKey()));
document.getElementById('qaPicker').addEventListener('change', e=>goQA(e.target.value));

/* ════════════════════════════════════════════
   TAB 3 — TUẦN PHÁP LUẬT
════════════════════════════════════════════ */
function allWeeks() {
  return Object.keys(DATA_WEEKS).sort((a,b)=>{
    const wa=DATA_WEEKS[a], wb=DATA_WEEKS[b];
    return wa.month-wb.month || wa.week-wb.week;
  });
}
function adjWeek(key, dir) {
  const wks = allWeeks(), idx = wks.indexOf(key);
  if (idx===-1) return null;
  const n = idx+dir;
  return (n>=0&&n<wks.length) ? wks[n] : null;
}
function currentWeekKey() {
  const n = new Date();
  const d = new Date(2026, n.getMonth(), n.getDate());
  const key = `2026-${pad(d.getMonth()+1)}-W${Math.ceil(d.getDate()/7)}`;
  return DATA_WEEKS[key] ? key : allWeeks()[0];
}
function renderLuat(key) {
  const card = document.getElementById('luatCard');
  const e = DATA_WEEKS[key];
  if (!e) { card.innerHTML=`<div class="no-data"><div class="nd-icon">📖</div><p>Không có dữ liệu.</p></div>`; return; }
  card.innerHTML = `
    <div class="card-hd blue-hd">
      <div class="hicon">⚖️</div>
      <div>
        <div class="htitle">Mỗi Tuần Một Điều Luật</div>
        <div class="hdate">Tuần ${e.week} — ${MONTHS_VI[e.month]} 2026</div>
      </div>
    </div>
    <div class="law-block">
      <div class="law-title">${(()=>{
        const c=e.title+' '+e.content;
        const i=c.indexOf('\n');
        return i!==-1?c.substring(0,i).trim():c.trim();
      })()}</div>
      <div class="law-content">${(()=>{
        const c=e.title+' '+e.content;
        const i=c.indexOf('\n');
        if(i===-1) return '';
        return c.substring(i+1)
          // join soft-wrapped lines: \n followed by lowercase/mid-sentence → space
          .replace(/\n([a-zđăâêôơưáàảãạắằẳẵặấầẩẫậéèẻẽẹếềểễệíìỉĩịóòỏõọốồổỗộớờởỡợúùủũụứừửữựýỳỷỹỵ])/g,' $1')
          // real paragraph breaks → <br><br>
          .replace(/\n/g,'<br>');
      })()}</div>
    </div>`;
}
function goLuat(key) {
  curWeek = key;
  const e = DATA_WEEKS[key];
  document.getElementById('luatDisplay').textContent = e ? `Tuần ${e.week} — ${MONTHS_VI[e.month]}` : '—';
  document.getElementById('luatPrev').disabled = !adjWeek(key,-1);
  document.getElementById('luatNext').disabled = !adjWeek(key, 1);
  document.querySelectorAll('#weekChips .chip').forEach(c => c.classList.toggle('active', c.dataset.key===key));
  renderLuat(key);
  window.scrollTo({top:0,behavior:'smooth'});
}
function buildWeekChips() {
  const chips = document.getElementById('weekChips');
  chips.innerHTML = '';
  allWeeks().forEach(k => {
    const e = DATA_WEEKS[k];
    const c = document.createElement('button');
    c.className='chip blue-chip'; c.dataset.key=k;
    c.textContent=`T${e.month}/W${e.week}`;
    c.title=`Tuần ${e.week} Tháng ${e.month}: ${e.title.substring(0,50)}`;
    c.addEventListener('click', ()=>goLuat(k));
    chips.appendChild(c);
  });
}
document.getElementById('luatPrev').addEventListener('click', ()=>{ const k=adjWeek(curWeek,-1); if(k)goLuat(k); });
document.getElementById('luatNext').addEventListener('click', ()=>{ const k=adjWeek(curWeek, 1); if(k)goLuat(k); });
document.getElementById('luatNow').addEventListener('click',  ()=>goLuat(currentWeekKey()));

/* ════════════════════════════════════════════
   KEYBOARD NAVIGATION
════════════════════════════════════════════ */
document.addEventListener('keydown', e => {
  const active = document.querySelector('.tab-btn.active')?.dataset.tab;
  if (e.key==='ArrowLeft') {
    if (active==='tab-bac')    { const d=adjDate(DATA_BAC,curBac,-1); if(d)goBac(d); }
    if (active==='tab-cauhoi') { const d=adjDate(DATA_QA,curQA,-1);  if(d)goQA(d);  }
    if (active==='tab-luat')   { const k=adjWeek(curWeek,-1); if(k)goLuat(k);        }
  }
  if (e.key==='ArrowRight') {
    if (active==='tab-bac')    { const d=adjDate(DATA_BAC,curBac, 1); if(d)goBac(d); }
    if (active==='tab-cauhoi') { const d=adjDate(DATA_QA,curQA,  1); if(d)goQA(d);  }
    if (active==='tab-luat')   { const k=adjWeek(curWeek, 1); if(k)goLuat(k);        }
  }
});

/* ════════════════════════════════════════════
   LOAD ALL DATA
════════════════════════════════════════════ */
Promise.all([
  fetch('data.json').then(r=>r.json()),
  fetch('data_cauhoi.json').then(r=>r.json()),
  fetch('data_tuanphapluat.json').then(r=>r.json())
]).then(([bac, qa, weeks]) => {
  DATA_BAC   = bac;
  DATA_QA    = qa;
  DATA_WEEKS = weeks;

  // Build month chips
  buildMonthChips('monthNavBac',  DATA_BAC, '',  goBac);
  buildMonthChips('monthNavQA',   DATA_QA,  '',  goQA);
  buildWeekChips();

  // Init Tab 1
  const today = todayKey();
  const startBac = DATA_BAC[today] ? today : (adjDate(DATA_BAC,today,1)||adjDate(DATA_BAC,today,-1)||Object.keys(DATA_BAC).sort()[0]);
  goBac(startBac);

  // Init Tab 2
  const startQA = DATA_QA[today] ? today : (adjDate(DATA_QA,today,1)||adjDate(DATA_QA,today,-1)||Object.keys(DATA_QA).sort()[0]);
  goQA(startQA);

  // Init Tab 3
  goLuat(currentWeekKey());

}).catch(err => {
  console.error(err);
  const msg = `<div class="no-data"><div class="nd-icon">⚠️</div><p>Không tải được dữ liệu.<br>Hãy đảm bảo các file <code>data.json</code>, <code>data_cauhoi.json</code>, <code>data_tuanphapluat.json</code> nằm cùng thư mục.</p></div>`;
  document.getElementById('bacCard').innerHTML  = msg;
  document.getElementById('qaCard').innerHTML   = msg;
  document.getElementById('luatCard').innerHTML = msg;
});
</script>
</body>
</html>
